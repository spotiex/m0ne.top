backend:
  name: git-gateway
  branch: master

locale: 'zh_Hans'
local_backend: true
editor:
  preview: true

media_folder: "public/uploads"
public_folder: "/uploads"
media_library:
  name: "r2"
  config:
    upload_endpoint: "/api/admin/r2-upload"
    path: "blog"
    accept: "image/*"
    max_size_mb: 15

collections:
  - name: "blog"
    label: "文章"
    folder: "src/content/blog"
    path: "{{slug}}/index"
    extension: "md"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    media_folder: ""
    public_folder: "./"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      -
        label: "URL 别名"
        name: "slug"
        widget: "string"
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "只允许小写字母、数字和连字符"]
      - { label: "SEO 标题", name: "seoTitle", widget: "string", required: false }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "发布日期", name: "pubDate", widget: "datetime" }
      - { label: "更新日期", name: "updatedDate", widget: "datetime", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "封面图", name: "coverImage", widget: "image", required: false }
      -
        label: "正文"
        name: "body"
        widget: "markdown"
        modes: ["rich_text", "raw"]

  - name: "notes"
    label: "随笔"
    folder: "src/content/notes"
    path: "{{slug}}/index"
    extension: "md"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    media_folder: ""
    public_folder: "./"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      -
        label: "URL 别名"
        name: "slug"
        widget: "string"
        pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "只允许小写字母、数字和连字符"]
      - { label: "描述", name: "description", widget: "text" }
      - { label: "发布日期", name: "pubDate", widget: "datetime" }
      - { label: "心情", name: "mood", widget: "string", required: false }
      -
        label: "正文"
        name: "body"
        widget: "markdown"
        modes: ["rich_text", "raw"]
